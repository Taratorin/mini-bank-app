input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [message] =~ "(?i)(password|secret|token)" {
    mutate {
      gsub => [ "message", "(?i)(password|secret|token)\s*[:=]\s*\S+", "\1=***" ]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "bank-logs-%{+YYYY.MM.dd}"
  }
}