management:
  tracing:
    enabled: false

spring:
  datasource:
    url: jdbc:h2:mem:accounts-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

bank:
  notifications:
    base-url: http://localhost:8087