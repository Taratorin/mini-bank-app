server:
  port: 8084

bank:
  gateway:
    base-url: http://localhost:8081

logging:
  level:
    root: INFO
    ru.cloudwithout.bankui.controller: DEBUG

spring:
  application:
    name: bank-ui
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: bank-ui
            client-secret: ui-client-secret
            authorization-grant-type: authorization_code
            scope: openid, profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            provider: keycloak
          accounts-service:
            client-id: accounts-service
            client-secret: accounts-service-secret
            authorization-grant-type: client_credentials
            provider: keycloak
          cash-service:
            client-id: cash-service
            client-secret: cash-service-secret
            authorization-grant-type: client_credentials
            provider: keycloak
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/bank-realm