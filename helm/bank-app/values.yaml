# Umbrella chart values (release name: bank-app)

observability: &observability
  zipkinEndpoint: http://172.18.0.1:9411/api/v2/spans
  logstashHost: 172.18.0.1
  logstashPort: 5000

postgres:
  enabled: true
  image: postgres:18.3
  database: bank-app
  username: user
  password: sa
  storage: 10Mi

bank-ui:
  enabled: true
  observability: *observability
  image:
    repository: bank-ui
    tag: latest
    pullPolicy: Never
  gateway:
    baseUrl: http://bank-app-bank-gateway:8081
  keycloak:
    issuerUri: http://172.18.0.1:8080/realms/bank-realm
  oauth:
    keycloakClientSecret: ui-client-secret
    accountsServiceClientSecret: accounts-service-secret
    cashServiceClientSecret: cash-service-secret
    transferServiceClientSecret: transfer-service-secret

bank-gateway:
  enabled: true
  observability: *observability
  image:
    repository: bank-gateway
    tag: latest
    pullPolicy: Never
  keycloak:
    issuerUri: http://172.18.0.1:8080/realms/bank-realm
  oauth:
    accountsServiceClientSecret: accounts-service-secret
    cashServiceClientSecret: cash-service-secret
    transferServiceClientSecret: transfer-service-secret
  routes:
    accountsUri: http://bank-app-accounts-service:8083
    cashUri: http://bank-app-cash-service:8085
    transferUri: http://bank-app-transfer-service:8086

accounts-service:
  enabled: true
  observability: *observability
  image:
    repository: accounts-service
    tag: latest
    pullPolicy: Never
  keycloak:
    issuerUri: http://172.18.0.1:8080/realms/bank-realm
  kafka:
    bootstrapServers: bank-app-kafka-headless.default.svc.cluster.local:9092
    topic: notifications
  postgres:
    jdbcUrl: jdbc:postgresql://bank-app-postgres:5432/bank-app?currentSchema=accounts
    username: user
    password: sa
  oauth:
    clientSecret: accounts-service-secret

cash-service:
  enabled: true
  observability: *observability
  image:
    repository: cash-service
    tag: latest
    pullPolicy: Never
  keycloak:
    issuerUri: http://172.18.0.1:8080/realms/bank-realm
  accounts:
    baseUrl: http://bank-app-accounts-service:8083
  kafka:
    bootstrapServers: bank-app-kafka-headless.default.svc.cluster.local:9092
    topic: notifications
  oauth:
    cashClientSecret: cash-service-secret
    accountsClientSecret: accounts-service-secret

transfer-service:
  enabled: true
  observability: *observability
  image:
    repository: transfer-service
    tag: latest
    pullPolicy: Never
  keycloak:
    issuerUri: http://172.18.0.1:8080/realms/bank-realm
  accounts:
    baseUrl: http://bank-app-accounts-service:8083
  kafka:
    bootstrapServers: bank-app-kafka-headless.default.svc.cluster.local:9092
    topic: notifications
  oauth:
    clientSecret: transfer-service-secret

notifications-service:
  enabled: true
  observability: *observability
  image:
    repository: notifications-service
    tag: latest
    pullPolicy: Never
  keycloak:
    issuerUri: http://172.18.0.1:8080/realms/bank-realm
  kafka:
    bootstrapServers: bank-app-kafka-headless.default.svc.cluster.local:9092
    topic: notifications
    consumerGroup: notifications-service

kafka:
  enabled: true
  image: apache/kafka:3.7.1
  storage: 10Mi