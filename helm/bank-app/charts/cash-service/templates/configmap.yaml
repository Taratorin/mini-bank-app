apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-cash-service
data:
  application.yaml: |
    server:
      port: {{ .Values.container.port }}
    spring:
      application:
        name: cash-service
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: {{ .Values.keycloak.issuerUri }}
          client:
            registration:
              cash-service:
                client-id: {{ .Values.oauth.cashClientId }}
                authorization-grant-type: client_credentials
                provider: keycloak
              accounts-service:
                client-id: {{ .Values.oauth.accountsClientId }}
                authorization-grant-type: client_credentials
                provider: keycloak
            provider:
              keycloak:
                issuer-uri: {{ .Values.keycloak.issuerUri }}
      kafka:
        bootstrap-servers: {{ .Release.Name }}-kafka-headless.{{ .Release.Namespace }}.svc.cluster.local:9092
        producer:
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    management:
      endpoints:
        web:
          exposure:
            include: health,info,prometheus,metrics
      tracing:
        sampling:
          probability: 1
        export:
          zipkin:
            endpoint: {{ .Values.observability.zipkinEndpoint }}
      zipkin:
        tracing:
          endpoint: {{ .Values.observability.zipkinEndpoint }}
    bank:
      accounts:
        base-url: {{ .Values.accounts.baseUrl }}
      kafka:
        topic: notifications
      observability:
        logstash-host: {{ .Values.observability.logstashHost }}
        logstash-port: {{ .Values.observability.logstashPort }}