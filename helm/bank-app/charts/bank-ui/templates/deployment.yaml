apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-bank-ui
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: bank-ui
  template:
    metadata:
      labels:
        app: bank-ui
    spec:
      containers:
        - name: bank-ui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.container.port }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-bank-ui
            - secretRef:
                name: {{ .Release.Name }}-bank-ui