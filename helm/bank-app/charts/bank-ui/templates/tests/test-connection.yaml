apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-bank-ui-test
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - nc -zvw3 {{ .Release.Name }}-bank-ui {{ .Values.service.port }}
