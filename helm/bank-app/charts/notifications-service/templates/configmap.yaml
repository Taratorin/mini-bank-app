apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-notifications-service
data:
  application.yaml: |
    server:
      port: {{ .Values.container.port }}
    spring:
      application:
        name: notifications-service
      main:
        web-application-type: none
      kafka:
        bootstrap-servers: {{ .Values.kafka.bootstrapServers }}
        consumer:
          group-id: {{ .Values.kafka.consumerGroup }}
          auto-offset-reset: earliest
          key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
          value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
          properties:
            spring:
              json:
                trusted:
                  packages: ru.cloudwithout.commonmodels.common.dto
                value:
                  default:
                    type: ru.cloudwithout.commonmodels.common.dto.NotificationRequest
                use:
                  type:
                    headers: false
    management:
      endpoints:
        web:
          exposure:
            include: health,info,prometheus,metrics
      tracing:
        sampling:
          probability: 1
        export:
          zipkin:
            endpoint: {{ .Values.observability.zipkinEndpoint }}
      zipkin:
        tracing:
          endpoint: {{ .Values.observability.zipkinEndpoint }}
    bank:
      kafka:
        topic: {{ .Values.kafka.topic }}
        consumer-group: {{ .Values.kafka.consumerGroup }}
      observability:
        logstash-host: {{ .Values.observability.logstashHost }}
        logstash-port: {{ .Values.observability.logstashPort }}