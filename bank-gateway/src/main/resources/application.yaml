server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    root: INFO

spring:
  application:
    name: bank-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          # Адрес issuer (Keycloak realm). Gateway по нему получает ключи
          # и параметры токена, чтобы валидировать JWT от UI
          issuer-uri: http://localhost:8080/realms/bank-realm

  cloud:
    gateway:
      server:
        webflux:
          routes:
            # Имя маршрута (используется в логах и конфигурации)
            - id: transfer-service
              # Куда Gateway проксирует запросы, подходящие под предикаты
              # Здесь это transfer-service
              uri: http://localhost:8082
              predicates:
                # Все запросы с путём /transfers/** попадут на этот маршрут
                - Path=/transfers/**
            - id: accounts-service
              uri: http://localhost:8083
              predicates:
                - Path=/accounts/**
            - id: cash-service
              uri: http://localhost:8085
              predicates:
                - Path=/cash/**