groups:
  - name: bank.rules
    rules:
      - alert: HighHttp5xxRate
        expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Высокий уровень HTTP 5xx"
          description: "Суммарный rate 5xx ответов превысил 0.1 req/s за 5 минут."

      - alert: CashWithdrawFailures
        expr: increase(bank_cash_withdraw_failed_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Зафиксированы неуспешные снятия"
          description: "За последние 5 минут есть неуспешные попытки снятия средств."

      - alert: TransferFailures
        expr: increase(bank_transfer_failed_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Зафиксированы неуспешные переводы"
          description: "За последние 5 минут есть неуспешные попытки перевода."

      - alert: NotificationProcessingFailures
        expr: increase(bank_notification_send_failed_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Сбои обработки уведомлений"
          description: "notifications-service не обработал одно или более уведомлений."