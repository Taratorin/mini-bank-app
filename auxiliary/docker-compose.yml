services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    container_name: bank-app-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HOSTNAME: http://172.18.0.1:8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    command: start-dev --import-realm
    volumes:
      - ./bank-realm-realm.json:/opt/keycloak/data/import/bank-realm-realm.json
    ports:
      - "8080:8080"
      - "9000:9000"
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/9000' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

networks:
  default:
    name: mini-bank-app